<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | TraderNet 📈</title>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(21, 28, 44, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success-color: #10b981;
      --error-color: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      top: 10%;
      left: 15%;
      z-index: -1;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
      bottom: 10%;
      right: 10%;
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f3f4f6 30%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span {
      background: none;
      -webkit-text-fill-color: initial;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text-main);
    }

    .info-text {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
      width: 100%;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      background-color: #1f293d;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    input:disabled {
      background-color: rgba(31, 41, 61, 0.5);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-submit:hover:not(:disabled) {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
    }

    .alert-error {
      background-color: rgba(244, 63, 94, 0.12);
      border: 1px solid rgba(244, 63, 94, 0.25);
      color: #fb7185;
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #34d399;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
    }

    .footer a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--primary-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TraderNet 📈</div>
    <div class="title">Reset Your Password</div>
    <div class="info-text">Complete the secure form below to update your password and unlock your account.</div>

    <div id="errorAlert" class="alert alert-error"></div>
    <div id="successAlert" class="alert alert-success"></div>

    <form id="resetForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="tokenInput">6-Digit Security Token</label>
        <input type="text" id="tokenInput" placeholder="Enter reset code" required maxlength="6" disabled>
      </div>

      <div class="form-group">
        <label for="passwordInput">New Password</label>
        <input type="password" id="passwordInput" placeholder="Min. 6 characters" required minlength="6">
      </div>

      <div class="form-group">
        <label for="confirmPasswordInput">Confirm New Password</label>
        <input type="password" id="confirmPasswordInput" placeholder="Re-enter password" required minlength="6">
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">Update Password</button>
    </form>

    <div class="footer">
      <p>Remembered your password? <a href="#" onclick="alert('Open the mobile app to log in!')">Log In</a></p>
    </div>
  </div>

  <script>
    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const tokenInput = document.getElementById('tokenInput');
    if (token) {
      tokenInput.value = token;
    } else {
      // Allow manual entry if token is not in URL
      tokenInput.disabled = false;
      tokenInput.placeholder = "e.g., 482910";
    }

    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.style.display = 'block';
      successAlert.style.display = 'none';
    }

    function showSuccess(msg) {
      successAlert.textContent = msg;
      successAlert.style.display = 'block';
      errorAlert.style.display = 'none';
    }

    async function handleSubmit(event) {
      event.preventDefault();
      
      const enteredToken = tokenInput.value.trim();
      const newPassword = document.getElementById('passwordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;

      if (!enteredToken) {
        showError("Security token is required.");
        return;
      }

      if (newPassword.length < 6) {
        showError("Password must be at least 6 characters.");
        return;
      }

      if (newPassword !== confirmPassword) {
        showError("Passwords do not match.");
        return;
      }

      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = "Processing Reset...";

      try {
        const response = await fetch('/api/users/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: enteredToken,
            newPassword: newPassword
          })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess(data.message || "Password updated successfully! You can now log in via the app.");
          document.getElementById('resetForm').style.display = 'none';
          document.querySelector('.info-text').textContent = "Your password has been changed successfully. Please open the TraderNet mobile app on your smartphone to log in.";
        } else {
          showError(data.message || "Failed to reset password.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Update Password";
        }
      } catch (err) {
        showError("Failed to connect to the server. Please verify network status.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Update Password";
      }
    }
  </script>
</body>
</html>
