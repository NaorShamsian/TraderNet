<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraderNet - D3.js Database Statistics Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: #151c2c;
      --primary: #6366f1;
      --secondary: #a855f7;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --grid: rgba(255, 255, 255, 0.03);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dashboard-container {
      width: 100%;
      max-width: 1100px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 10px 0;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin: 0;
    }
    .stats-summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .summary-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .summary-number {
      font-size: 36px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .summary-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    @media (max-width: 900px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
    .chart-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .chart-title {
      font-size: 16px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 20px;
      align-self: flex-start;
      color: var(--text);
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }
    svg {
      width: 100%;
      height: 320px;
    }
    .axis-label {
      font-size: 11px;
      fill: var(--text-muted);
    }
    .bar {
      fill: url(#bar-gradient);
      rx: 4;
      ry: 4;
      transition: fill 0.2s;
    }
    .bar:hover {
      fill: var(--secondary);
      cursor: pointer;
    }
    .tooltip {
      position: absolute;
      background: #1e293b;
      border: 1px solid var(--border);
      color: #fff;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .grid-line {
      stroke: var(--grid);
      stroke-width: 1px;
    }
    .domain, .tick line {
      stroke: var(--border);
    }
    .legend-text {
      font-size: 11px;
      fill: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <header>
      <h1>TraderNet Statistics Dashboard 📈</h1>
      <p class="subtitle">Real-time database analytics powered by D3.js and MongoDB aggregation pipelines</p>
    </header>

    <!-- General Stats Row -->
    <div class="stats-summary-row">
      <div class="summary-card">
        <div class="summary-number" id="sumUsers">-</div>
        <div class="summary-label">Total Users</div>
      </div>
      <div class="summary-card">
        <div class="summary-number" id="sumPosts">-</div>
        <div class="summary-label">Total Analyses / Posts</div>
      </div>
      <div class="summary-card">
        <div class="summary-number" id="sumGroups">-</div>
        <div class="summary-label">Trading Groups</div>
      </div>
    </div>

    <!-- Charts Grid -->
    <div class="charts-grid">
      <!-- Chart 1: Bar Chart of Posts per Group -->
      <div class="chart-card">
        <h3 class="chart-title">Posts per Group / Feed</h3>
        <svg id="postsBarChart"></svg>
      </div>

      <!-- Chart 2: Donut Chart of Users per Group -->
      <div class="chart-card">
        <h3 class="chart-title">Members per Trading Group</h3>
        <svg id="usersDonutChart"></svg>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    // Fetch live statistics from backend API
    d3.json("/api/statistics").then(data => {
      // 1. Populate summary cards
      $("#sumUsers").text(data.summary.totalUsers);
      $("#sumPosts").text(data.summary.totalPosts);
      $("#sumGroups").text(data.summary.totalGroups);

      // Render Charts
      renderPostsBarChart(data.postsPerGroup);
      renderUsersDonutChart(data.usersPerGroup);
    }).catch(err => {
      console.error("Failed to load statistics:", err);
      // Mock fallback if API fails (just in case)
      const mockData = {
        summary: { totalUsers: 15, totalPosts: 32, totalGroups: 5 },
        postsPerGroup: [
          { groupName: "Global Feed", count: 18 },
          { groupName: "Crypto Bulls", count: 8 },
          { groupName: "WallStreetBets", count: 5 },
          { groupName: "Forex Masters", count: 3 }
        ],
        usersPerGroup: [
          { groupName: "Crypto Bulls", count: 12 },
          { groupName: "WallStreetBets", count: 9 },
          { groupName: "Forex Masters", count: 6 },
          { groupName: "Tech Scalpers", count: 4 }
        ]
      };
      $("#sumUsers").text(mockData.summary.totalUsers);
      $("#sumPosts").text(mockData.summary.totalPosts);
      $("#sumGroups").text(mockData.summary.totalGroups);
      renderPostsBarChart(mockData.postsPerGroup);
      renderUsersDonutChart(mockData.usersPerGroup);
    });

    // Helper jQuery-like selector replacement for standard JS
    function $(id) { return d3.select(id); }

    // Chart 1: Render Bar Chart using D3.js
    function renderPostsBarChart(data) {
      const svg = d3.select("#postsBarChart");
      const width = 450;
      const height = 280;
      const margin = { top: 20, right: 20, bottom: 60, left: 40 };

      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;

      svg.attr("viewBox", `0 0 ${width} ${height}`);

      const g = svg.append("g")
        .attr("transform", `translate(${margin.left}, ${margin.top})`);

      // Add Gradients
      const defs = svg.append("defs");
      const gradient = defs.append("linearGradient")
        .attr("id", "bar-gradient")
        .attr("x1", "0%")
        .attr("y1", "0%")
        .attr("x2", "0%")
        .attr("y2", "100%");
      gradient.append("stop")
        .attr("offset", "0%")
        .attr("stop-color", "#818cf8");
      gradient.append("stop")
        .attr("offset", "100%")
        .attr("stop-color", "#6366f1");

      // Scales
      const x = d3.scaleBand()
        .domain(data.map(d => d.groupName))
        .range([0, chartWidth])
        .padding(0.3);

      const y = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.count) || 5])
        .nice()
        .range([chartHeight, 0]);

      // Gridlines
      g.append("g")
        .attr("class", "grid")
        .selectAll("line")
        .data(y.ticks(5))
        .join("line")
        .attr("class", "grid-line")
        .attr("x1", 0)
        .attr("x2", chartWidth)
        .attr("y1", d => y(d))
        .attr("y2", d => y(d));

      // Axes
      g.append("g")
        .attr("transform", `translate(0, ${chartHeight})`)
        .call(d3.axisBottom(x))
        .selectAll("text")
        .attr("transform", "translate(-10,0)rotate(-25)")
        .style("text-anchor", "end")
        .style("font-size", "10px")
        .style("fill", "#9ca3af");

      g.append("g")
        .call(d3.axisLeft(y).ticks(5))
        .selectAll("text")
        .style("font-size", "10px")
        .style("fill", "#9ca3af");

      // Tooltip handler
      const tooltip = d3.select("#tooltip");

      // Bars
      g.selectAll(".bar")
        .data(data)
        .join("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.groupName))
        .attr("y", d => y(d.count))
        .attr("width", x.bandwidth())
        .attr("height", d => chartHeight - y(d.count))
        .on("mouseover", function(event, d) {
          tooltip.style("opacity", 1)
            .html(`<strong>${d.groupName}</strong><br>Posts: ${d.count}`)
            .style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mousemove", function(event) {
          tooltip.style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function() {
          tooltip.style("opacity", 0);
        });
    }

    // Chart 2: Render Donut Chart using D3.js
    function renderUsersDonutChart(data) {
      if (data.length === 0) {
        data = [{ groupName: "No Groups", count: 0 }];
      }

      const svg = d3.select("#usersDonutChart");
      const width = 450;
      const height = 280;
      svg.attr("viewBox", `0 0 ${width} ${height}`);

      const radius = Math.min(width, height) / 2 - 30;
      const g = svg.append("g")
        .attr("transform", `translate(${width / 2 - 50}, ${height / 2})`);

      // Color scheme
      const color = d3.scaleOrdinal()
        .domain(data.map(d => d.groupName))
        .range(["#6366f1", "#a855f7", "#ec4899", "#10b981", "#f59e0b", "#3b82f6"]);

      // Donut layout
      const pie = d3.pie()
        .value(d => d.count)
        .sort(null);

      const arc = d3.arc()
        .innerRadius(radius * 0.55)
        .outerRadius(radius * 0.95);

      const arcHover = d3.arc()
        .innerRadius(radius * 0.55)
        .outerRadius(radius * 1.02);

      const tooltip = d3.select("#tooltip");

      // Draw slices
      const arcs = g.selectAll(".arc")
        .data(pie(data))
        .join("g")
        .attr("class", "arc");

      arcs.append("path")
        .attr("d", arc)
        .attr("fill", d => color(d.data.groupName))
        .attr("stroke", "#151c2c")
        .attr("stroke-width", "3px")
        .style("transition", "all 0.2s")
        .on("mouseover", function(event, d) {
          d3.select(this).attr("d", arcHover);
          tooltip.style("opacity", 1)
            .html(`<strong>${d.data.groupName}</strong><br>Members: ${d.data.count}`)
            .style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mousemove", function(event) {
          tooltip.style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function() {
          d3.select(this).attr("d", arc);
          tooltip.style("opacity", 0);
        });

      // Add Legends
      const legendG = svg.append("g")
        .attr("transform", `translate(${width - 160}, ${height / 2 - (data.length * 10)})`);

      data.forEach((d, i) => {
        const row = legendG.append("g")
          .attr("transform", `translate(0, ${i * 20})`);

        row.append("rect")
          .attr("width", 12)
          .attr("height", 12)
          .attr("rx", 3)
          .attr("fill", color(d.groupName));

        row.append("text")
          .attr("x", 20)
          .attr("y", 10)
          .attr("class", "legend-text")
          .text(`${d.groupName} (${d.count})`);
      });
    }
  </script>
</body>
</html>
